name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app 2>/dev/null || sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install sqlite
        run: brew install sqlite

      - name: Run Tests
        run: swift test
        env:
          PKG_CONFIG_PATH: /opt/homebrew/opt/sqlite/lib/pkgconfig

      - name: Build Release
        run: swift build -c release --arch arm64 --arch x86_64
        env:
          PKG_CONFIG_PATH: /opt/homebrew/opt/sqlite/lib/pkgconfig

      - name: Create App Bundle
        run: bash build-app.sh --release --no-run

      - name: Create DMG
        run: bash scripts/create-dmg.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: NetMonitor.dmg
          path: NetMonitor.dmg

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: NetMonitor.app
          path: NetMonitor.app/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NetMonitor.dmg
            NetMonitor.app
          draft: true
          generate_release_notes: true
