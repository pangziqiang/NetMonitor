name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  build-and-test:
    needs: lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Install sqlite
        run: brew install sqlite
      - name: Build
        run: swift build
        env:
          PKG_CONFIG_PATH: /opt/homebrew/opt/sqlite/lib/pkgconfig
      - name: Test
        run: swift test
        env:
          PKG_CONFIG_PATH: /opt/homebrew/opt/sqlite/lib/pkgconfig

  benchmark:
    needs: build-and-test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Install sqlite
        run: brew install sqlite
      - name: Run Benchmark
        run: bash scripts/benchmark.sh
        env:
          PKG_CONFIG_PATH: /opt/homebrew/opt/sqlite/lib/pkgconfig